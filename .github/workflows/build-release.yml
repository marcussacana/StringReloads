name: Build & Auto Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Publish Auto-Release
    runs-on: windows-2022
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-Increment Version (v7.8.x)
        shell: powershell
        run: |
          git fetch --tags --force
          $tags = git tag -l "v7.8.*" | ForEach-Object { [int]($_ -replace "^v7\.8\.", "") } | Sort-Object -Descending

          if ($tags.Count -gt 0) {
              $nextPatch = $tags[0] + 1
          } else {
              $nextPatch = 0
          }

          $version = "7.8.$nextPatch"
          $tag = "v$version"
          $asmVersion = "$version.0"

          Write-Host "New Auto-Increment Version: $version ($tag)"

          echo "NEW_VERSION=$version" >> $env:GITHUB_ENV
          echo "NEW_TAG=$tag" >> $env:GITHUB_ENV
          echo "ASM_VERSION=$asmVersion" >> $env:GITHUB_ENV

          if (Test-Path "StringReloads/StringReloads.csproj") {
              (Get-Content "StringReloads/StringReloads.csproj") -replace '<AssemblyVersion>.*?</AssemblyVersion>', "<AssemblyVersion>$asmVersion</AssemblyVersion>" -replace '<FileVersion>.*?</FileVersion>', "<FileVersion>$asmVersion</FileVersion>" | Set-Content "StringReloads/StringReloads.csproj"
          }

          if (Test-Path "SRLWrapper/SRLWrapper.csproj") {
              (Get-Content "SRLWrapper/SRLWrapper.csproj") -replace '<AssemblyVersion>.*?</AssemblyVersion>', "<AssemblyVersion>$asmVersion</AssemblyVersion>" -replace '<FileVersion>.*?</FileVersion>', "<FileVersion>$asmVersion</FileVersion>" | Set-Content "SRLWrapper/SRLWrapper.csproj"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore & Build Release x86
        run: |
          msbuild StringReloads.sln /t:Restore /p:Configuration=Release /p:Platform="x86"
          msbuild StringReloads.sln /p:Configuration=Release /p:Platform="x86"

      - name: Restore & Build Release x64
        run: |
          msbuild StringReloads.sln /t:Restore /p:Configuration=Release /p:Platform="x64"
          msbuild StringReloads.sln /p:Configuration=Release /p:Platform="x64"

      - name: Create Release Zip Artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "./publish/x86"
          New-Item -ItemType Directory -Force -Path "./publish/x64"

          if (Test-Path "./Release") { Get-ChildItem "./Release" | Copy-Item -Destination "./publish/x86" -Recurse -Force }
          if (Test-Path "./x64/Release") { Get-ChildItem "./x64/Release" | Copy-Item -Destination "./publish/x64" -Recurse -Force }

          Compress-Archive -Path "./publish/x86/*" -DestinationPath "StringReloads-x86.zip" -Force
          Compress-Archive -Path "./publish/x64/*" -DestinationPath "StringReloads-x64.zip" -Force

      - name: Upload Build Artifacts (Actions)
        uses: actions/upload-artifact@v4
        with:
          name: StringReloads-${{ env.NEW_TAG }}
          path: |
            StringReloads-x86.zip
            StringReloads-x64.zip

      - name: Create GitHub Release (${{ env.NEW_TAG }})
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: StringReloads ${{ env.NEW_TAG }}
          files: |
            StringReloads-x86.zip
            StringReloads-x64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
